name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Configure npm registry
        run: npm config set registry https://registry.npmmirror.com

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
